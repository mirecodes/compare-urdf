# mapping_example.yml
# ---------------------------------------------------------------------------
# 각 object 에 대해 GT URDF 경로와 predictor 별 URDF 경로 및 joint 매핑을 정의한다.
#
# 최상위 키  : object 이름 (임의)
# gt 블록    : GT URDF 경로 + z_rotation (base z축 회전 각도, 단위: degree)
# predictor 블록 (aa / ours / screw / ...):
#   urdf_path  : predictor URDF 경로
#   z_rotation : base z축 회전 각도 (degree). GT 와 pred 각각 독립 적용 후 비교.
#   joint_pairs: {gt_joint_이름: pred_joint_이름}  (명시적 1:1 매핑)
#
# 경로는 이 파일을 기준으로 한 상대 경로 또는 절대 경로 모두 허용.
# pred 블록에 joint_pairs 가 없으면 해당 predictor 는 skip.
# ---------------------------------------------------------------------------

fan:
  gt:
    urdf_path: "../data/cat1/gt/fan.urdf"
    z_rotation: 0
  aa:
    urdf_path: "../data/cat1/aa/fan.urdf"
    z_rotation: 0
    joint_pairs:
      joint_0: fan_frame_to_rotor   # GT joint_0 ↔ pred fan_frame_to_rotor
  ours:
    urdf_path: "../data/cat1/ours/fan.urdf"
    z_rotation: 0
    joint_pairs:
      joint_0: joint_1_2            # GT joint_0 ↔ pred joint_1_2

microwave:
  gt:
    urdf_path: "../data/cat1/gt/microwave.urdf"
    z_rotation: 0
  aa:
    urdf_path: "../data/cat1/aa/microwave.urdf"
    z_rotation: 0
    joint_pairs:
      joint_0: microwave_body_to_door
  ours:
    urdf_path: "../data/cat1/ours/microwave.urdf"
    z_rotation: 0
    joint_pairs:
      joint_0: joint_1_2
